<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="rgba(99,102,241,0.25)" stroke-width="0.75"/>

  <!-- Main trunk: bottom node up to fork -->
  <line x1="11" y1="27" x2="11" y2="16" stroke="#3730a3" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Main trunk: fork up to top node -->
  <line x1="11" y1="16" x2="11" y2="8" stroke="#4338ca" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Feature branch: fork to branch node -->
  <line x1="11" y1="16" x2="22" y2="9" stroke="#5b5ef5" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Feature branch continuation down -->
  <line x1="22" y1="9" x2="22" y2="20" stroke="#4f46e5" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Glow layer for nodes (bloom effect) -->
  <circle cx="11" cy="8"  r="4" fill="#818cf8" opacity="0.25" filter="url(#bloom)"/>
  <circle cx="22" cy="9"  r="4" fill="#a78bfa" opacity="0.25" filter="url(#bloom)"/>
  <circle cx="22" cy="20" r="3.5" fill="#818cf8" opacity="0.20" filter="url(#bloom)"/>
  <circle cx="11" cy="27" r="4" fill="#6366f1" opacity="0.20" filter="url(#bloom)"/>

  <!-- Top trunk node (HEAD) -->
  <circle cx="11" cy="8"  r="2.8" fill="url(#glow1)"/>
  <!-- Feature branch start -->
  <circle cx="22" cy="9"  r="2.5" fill="url(#glow2)"/>
  <!-- Fork point (smaller) -->
  <circle cx="11" cy="16" r="1.8" fill="#6366f1"/>
  <!-- Feature branch end -->
  <circle cx="22" cy="20" r="2.5" fill="url(#glow2)"/>
  <!-- Bottom trunk node -->
  <circle cx="11" cy="27" r="2.8" fill="url(#glow1)"/>

  <!-- Highlight specular on top nodes -->
  <circle cx="10.2" cy="7.2" r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="21.3" cy="8.2" r="0.9" fill="rgba(255,255,255,0.30)"/>
</svg>
